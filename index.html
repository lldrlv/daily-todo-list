<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do List</title>
    <link rel="stylesheet" href="styles/normilize.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
    </style>
  </head>
  <body>
    <section class="container main-section">
      <h1 class="visually-hidden">To-Do List</h1>
      <h2 id="currentDateTitle">today</h2>
      <div class="dates"></div>
      <div class="filter">
        <select name="filter" id="filter">
          <option value="allTasks">All tasks</option>
          <option value="completed">Сompleted</option>
          <option value="unfulfilled">Unfulfilled</option>
          <option value="byCategory">By category</option>
        </select>
      </div>
      <ul class="to-do-list"></ul>
      <button id="openModalButton">Add a task</button>
      <form class="add-modal hidden">
        <button
          class="closeAddModalButton close-modal-button button"
          type="button"
        ></button>
        <h2>Add task</h2>
        <label for="taskName" class="visually-hidden">Write a task...</label>
        <input
          type="text"
          name="taskName"
          id="taskName"
          placeholder="Write a task..."
          required
        />
        <label for="deadline" class="visually-hidden"
          >Write a deadline...</label
        >
        <input
          type="date"
          name="deadline"
          id="deadline"
          placeholder="Write a deadline..."
          required
        />
        <label for="category" class="visually-hidden"
          >Choose a category...</label
        >
        <select name="category" id="category">
          <option value="" disabled selected>Choose a category...</option>
          <option value="other">Other</option>
          <option value="personal">Personal</option>
          <option value="home">Home</option>
          <option value="family">Family</option>
          <option value="work">Work</option>
          <option value="health">Health</option>
        </select>
        <button id="addButton" class="button">Add</button>
      </form>
      <form class="edit-modal hidden">
        <button
          class="closeEditModalButton close-modal-button button"
          type="button"
        ></button>
        <h2>Editing a task</h2>
        <label for="renameTask" class="visually-hidden"
          >Rename the task...</label
        >
        <input
          type="text"
          name="renameTask"
          id="renameTask"
          placeholder="Rename the task..."
        />
        <label for="newDeadline" class="visually-hidden"
          >Write the deadline...</label
        >
        <input
          type="date"
          name="newDeadline"
          id="newDeadline"
          placeholder="Edit the deadline..."
        />
        <label for="editCategory" class="visually-hidden"
          >Change a category...</label
        >
        <select name="editCategory" id="editCategory">
          <option value="" disabled selected>Choose a category...</option>
          <option value="other">Other</option>
          <option value="personal">Personal</option>
          <option value="home">Home</option>
          <option value="family">Family</option>
          <option value="work">Work</option>
          <option value="health">Health</option>
        </select>
        <div class="edit-modal-buttons">
          <button id="saveButton" class="button" type="button">
            Save changes</button
          ><button id="deleteButton" class="button" type="button">
            Delete task
          </button>
        </div>
      </form>
    </section>
    <script type="module" src="scripts/main.js"></script>
  </body>
</html>
